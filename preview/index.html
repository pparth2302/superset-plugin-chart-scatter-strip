<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scatter Strip Preview</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --surface: #fffdf9;
        --border: #d8cfbf;
        --text: #1f2328;
        --muted: #5b6470;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.08), transparent 24%),
          linear-gradient(180deg, #f7f3eb 0%, var(--bg) 100%);
        color: var(--text);
      }

      .page {
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px;
      }

      .header {
        margin-bottom: 20px;
      }

      .title {
        margin: 0 0 8px;
        font-size: 34px;
        line-height: 1.1;
      }

      .subtitle {
        margin: 0;
        max-width: 760px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .control {
        background: rgba(255, 253, 249, 0.92);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        box-shadow: 0 12px 32px rgba(31, 35, 40, 0.05);
      }

      .control label,
      .control .checkbox-label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .control input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        background: #fff;
      }

      .control input[type="checkbox"] {
        width: auto;
        margin-right: 8px;
      }

      .canvas-wrap {
        background: rgba(255, 253, 249, 0.94);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 18px 18px 8px;
        box-shadow: 0 18px 48px rgba(31, 35, 40, 0.08);
      }

      #chart {
        width: 100%;
        height: 620px;
      }

      .note {
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <h1 class="title">Scatter Strip 1xN Preview</h1>
        <p class="subtitle">
          Standalone preview for the Superset scatter strip plugin using sample
          nest data. Adjust panel count, point size, bounds, and regression
          lines before wiring it into Superset.
        </p>
      </div>

      <div class="controls">
        <div class="control">
          <label for="panelCount">Panel Count</label>
          <input id="panelCount" type="number" min="1" max="7" value="7" />
        </div>
        <div class="control">
          <label for="pointSize">Point Size</label>
          <input id="pointSize" type="number" min="2" max="30" value="10" />
        </div>
        <div class="control">
          <label for="xMin">X Min</label>
          <input id="xMin" type="number" step="0.1" placeholder="Auto" />
        </div>
        <div class="control">
          <label for="xMax">X Max</label>
          <input id="xMax" type="number" step="0.1" placeholder="Auto" />
        </div>
        <div class="control">
          <label for="yMin">Y Min</label>
          <input id="yMin" type="number" step="0.1" placeholder="Auto" />
        </div>
        <div class="control">
          <label for="yMax">Y Max</label>
          <input id="yMax" type="number" step="0.1" placeholder="Auto" />
        </div>
        <div class="control">
          <span class="checkbox-label">Options</span>
          <label>
            <input id="showRegressionLine" type="checkbox" />
            Show regression lines
          </label>
        </div>
      </div>

      <div class="canvas-wrap">
        <div id="chart"></div>
      </div>

      <p class="note">
        Run <code>npm run preview</code> and open
        <code>http://localhost:4173</code>.
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@6/dist/echarts.min.js"></script>
    <script src="./preview.js"></script>
  </body>
</html>
